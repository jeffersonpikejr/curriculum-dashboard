<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#080c14">
  <meta name="description" content="Personal Learning Curriculum — 10-topic deliberate-practice dashboard with reading goals, session log, and optional cloud sync.">
  <title>Personal Learning Curriculum</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%9A%3C/text%3E%3C/svg%3E">
  <script>
    // Cache-buster: timestamp query on every load forces fresh fetch of CSS + JS,
    // so edits never get stuck behind a stale browser cache.
    (function () {
      var v = '?v=' + Date.now();
      document.write('<link rel="stylesheet" href="styles.css' + v + '">');
    })();
  </script>
</head>
<body>
  <div class="app" id="app"></div>
  <script>
    (function () {
      var v = '?v=' + Date.now();
      document.write('<script src="data.js' + v + '"><\/script>');
      document.write('<script src="app.js' + v + '"><\/script>');
    })();
  </script>
</body>
</html>
